---
name: Control group add-on
description: Add-on to manage and control groups of entities based on templates
version: "b4a56c1"
slug: hass-addon-control-group
image: ghcr.io/kellerza/hass-addon-control-group
url: https://github.com/kellerza/hass-addons
services: ["mqtt:need"]
hassio_api: true
hassio_role: homeassistant
homeassistant_api: true
init: false
#apparmor: true
arch:
  - aarch64
  - amd64
map:
  - type: addon_cfg
    readonly: false
  - type: homeassistant_config
    readonly: false
    path: /haconfig
  - type: data
    readonly: false
    path: /data
options:
  NAME: main
schema:
  NAME: str

  HA_PREFIX: str?

  HA_API_URL: str?
  HA_API_TOKEN: str?

  MQTT_HOST: str?
  MQTT_PORT: port?
  MQTT_USERNAME: str?
  MQTT_PASSWORD: password?

  DEBUG: int(0,5)?
