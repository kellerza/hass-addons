name: Deploy hass-addon-control-group addon to ghcr.io

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed
    paths:
      - ".github/workflows/deploy-control-group.yml"
      - "hass-addon-control-group/**"
      - "src/ha_addon_control_group/**"
      - "src/ha_addon/**"
  workflow_dispatch: {}

jobs:
  deployer:
    uses: kellerza/hass-addons/.github/workflows/deployer2.yml@main
    secrets: inherit
    with:
      app: hass-addon-control-group
      app-edge: hass-addon-control-group
      #registry-image: ghcr.io/${{ github.repository_owner }}/hass-addon-control-group
    permissions:
      contents: read
      id-token: write
      packages: write