name: Deploy addons [cgroup, qsusb64, esp]

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    name: Test changed-files
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: read
    #secrets: inherit
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Get all test, doc and src files that have changed
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          files_yaml: |
            cgroup:
              - ".github/workflows/deploy-addons.yml"
              - ".github/workflows/deployer2.yml"
              - "hass-addon-control-group/**"
              - "src/ha_addon_control_group/**"
              - "src/ha_addon/**"
            qsusb64:
              - ".github/workflows/deploy-addons.yml"
              - ".github/workflows/deployer2.yml"
              - "hass-addon-qsusb64/**"
              - "src/ha_addon_qsusb64/**"
              - "src/ha_addon/**"
            esp:
              - ".github/workflows/deploy-addons.yml"
              - ".github/workflows/deployer2.yml"
              - "hass-addon-esp/**"
              - "src/ha_addon_esp/**"
              - "src/ha_addon/**"

    outputs:
      changed_esp: ${{ steps.changed.outputs.esp_any_changed }}
      changed_cgroup: ${{ steps.changed.outputs.cgroup_any_changed }}
      changed_qsusb64: ${{ steps.changed.outputs.qsusb64_any_changed }}

  deploy_cgroup:
    needs: [check]
    if: ${{ needs.check.outputs.changed_cgroup == 'true' }}
    uses: kellerza/hass-addons/.github/workflows/deployer2.yml@main
    secrets: inherit
    with:
      app: hass-addon-control-group
      app-edge: hass-addon-control-group
      publish: true
    permissions:
      contents: write
      id-token: write
      packages: write

  deploy_esp:
    needs: [check]
    if: ${{ needs.check.outputs.changed_esp == 'true' }}
    uses: kellerza/hass-addons/.github/workflows/deployer2.yml@main
    secrets: inherit
    with:
      app: hass-addon-esp
      app-edge: hass-addon-esp
      publish: true
    permissions:
      contents: write
      id-token: write
      packages: write

  deploy_qsusb64:
    needs: [check]
    if: ${{ needs.check.outputs.changed_qsusb64 == 'true' }}
    uses: kellerza/hass-addons/.github/workflows/deployer2.yml@main
    secrets: inherit
    with:
      app: hass-addon-qsusb64
      app-edge: hass-addon-qsusb64
      publish: true
    permissions:
      contents: write
      id-token: write
      packages: write
