name: Deploy hass-addon-qsusb64 addon to ghcr.io

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed
    paths:
      - ".github/workflows/deploy-qsusb64.yml"
      - "hass-addon-qsusb64/**"
      - "src/ha_addon_qsusb64/**"
      - "src/ha_addon/**"
  workflow_dispatch: {}

jobs:
  deployer:
    uses: kellerza/hass-addons/.github/workflows/deployer2.yml@main
    secrets: inherit
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      app: hass-addon-qsusb64
      app-edge: hass-addon-qsusb64
