on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      app-edge:
        required: true
        type: string
      publish:
        required: true
        type: boolean

name: Deploy addon to ghcr.io

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Get app information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ inputs.app }}"

      - name: Normalize app information
        id: normalize
        run: |
          image=${{ steps.info.outputs.image }}
          echo "image_name=${image##*/}" >> "$GITHUB_OUTPUT"
          echo "registry_prefix=${image%/*}" >> "$GITHUB_OUTPUT"
          version=${{ steps.info.outputs.version }}
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          name=${{ steps.info.outputs.name }}
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          description=${{ steps.info.outputs.description }}
          echo "description=${description}" >> "$GITHUB_OUTPUT"
          url=${{ steps.info.outputs.url }}
          if [[ -n "$url" && "$url" != "null" ]]; then
            echo "url=${url}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}


  build:
    name: 👷 Build & Deploy ${{ matrix.platform }} ${{ needs.prepare.outputs.environment }}/${{ needs.prepare.outputs.version }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Prepare Files for Build
        run: |
          # if executable, run
          if [ -x "./build_prep.sh" ]; then
            echo "Running build_prep.sh to prepare files for the build..."
            ./build_prep.sh "${{ inputs.app }}" "${{ needs.prepare.outputs.version }}"
          else
            echo "No build_prep.sh found, skipping file preparation step."
          fi

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: "./${{ inputs.app }}"
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            ${{ needs.prepare.outputs.url && format('io.hass.url={0}', needs.prepare.outputs.url) || '' }}
          push: ${{ inputs.publish }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: 🆕 Publish multi-arch manifest
    needs: [prepare, build]
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}

  publish_addon:
    name: 🆕 Update addon version to ${{ needs.prepare.outputs.version }}
    needs: [prepare, build, manifest]
    if: inputs.publish
    # branches: [main] - restrict?
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update versions and commit changes
        run: |
          # Pull latest changes with rebase strategy
          git pull --rebase origin main

          sed -i 's/version:.*/version: "${{ needs.prepare.outputs.version }}"/g' ${{ inputs.app-edge }}/config.yaml
          git add ${{ inputs.app-edge }}/config.yaml

          if [[ "${{ needs.prepare.outputs.environment }}" == "stable" ]]; then
            sed -i 's/version:.*/version: "${{ needs.prepare.outputs.version }}"/g' ${{ inputs.app }}/config.yaml
            git add ${{ inputs.app }}/config.yaml
          fi

          git commit -m "Update addon version to ${{ needs.prepare.outputs.version }} [no ci]" || echo "No changes to commit"

      - name: Push changes
        run: |
          # Try to push changes
          for i in {1..3}; do
            if git push origin main; then
              echo "Successfully pushed changes"
              exit 0
            else
              echo "Push failed, attempting to rebase and retry..."
              git pull --rebase origin main
            fi
            echo "Waiting 5 seconds before next push attempt..."
            sleep 5
          done
          echo "Failed to push after 3 attempts"
          exit 1
