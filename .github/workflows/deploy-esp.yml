name: Deploy hass-addon-esp addon to ghcr.io

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed
    paths:
      - ".github/workflows/deploy-esp.yml"
      - "hass-addon-esp/**"
      - "src/ha_addon_esp/**"
      - "src/ha_addon/**"
  workflow_dispatch: {}

jobs:
  deployer:
    uses: kellerza/hass-addons/.github/workflows/deployer2.yml@main
    secrets: inherit
    with:
      app: hass-addon-esp
      app-edge: hass-addon-esp
