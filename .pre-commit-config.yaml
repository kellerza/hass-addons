repos:
  - repo: local
    hooks:
      - id: uv lock
        name: uv sync && upgrade
        entry: uv sync --upgrade --all-extras
        language: system
        pass_filenames: false
        priority: 0

      - id: cp-readme
        name: Copy README.md to DOCS.md
        entry: cp hass-addon-control-group/README.md hass-addon-control-group/DOCS.md
        language: system
        pass_filenames: false
        priority: 10

      - id: cp-readme-qsusb64
        name: Copy README.md to DOCS.md
        entry: cp hass-addon-qsusb64/README.md hass-addon-qsusb64/DOCS.md
        language: system
        pass_filenames: false
        priority: 10

      - id: pyproject-fmt
        name: pyproject-fmt
        entry: uv run pyproject-fmt pyproject.toml
        language: system
        pass_filenames: false
        priority: 20

      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        pass_filenames: false
        priority: 30

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format --exit-non-zero-on-fix
        language: system
        pass_filenames: false
        priority: 30

      - id: zuban
        name: zuban
        entry: uv run zuban check src
        language: system
        pass_filenames: false
        priority: 40

      - id: codespell
        name: codespell
        entry: uv run codespell --toml pyproject.toml
        language: system
        pass_filenames: false
        priority: 40

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
        priority: 50
